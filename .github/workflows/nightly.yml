name: Spring Softball Ratings

on:
  schedule:
    - cron: '0 8 * * *'  # Runs daily at 8 AM UTC — adjust as needed
  workflow_dispatch:       # Allows manual triggering

jobs:
  run-ratings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Spring Softball Ratings
        run: python Spring_Softball_Rankings.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add spring_softball_ratings.json spring_softball_scoreboard.csv
          git diff --cached --quiet || git commit -m "Update spring softball ratings"
          git push
